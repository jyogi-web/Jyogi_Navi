name: Deploy API

on:
  push: # テスト中: 全ブランチからデプロイ可能（確認後 branches: [main] に戻す）
  workflow_dispatch: # 手動実行も可能

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false # デプロイ中断で Cloud Run が壊れた状態になるのを防ぐ

jobs:
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation に必要
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/jyogi-navi/api
          SHA: ${{ github.sha }}
        run: |
          docker build -t "${REGISTRY}:${SHA}" -t "${REGISTRY}:latest" apps/api
          docker push "${REGISTRY}:${SHA}"
          docker push "${REGISTRY}:latest"

  deploy:
    name: Deploy to Cloud Run
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Workload Identity Federation に必要
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: jyogi-navi-api
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/jyogi-navi/api:${{ github.sha }}
          flags: |
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --allow-unauthenticated
          env_vars: |
            APP_ENV=production,
            TIDB_PORT=${{ secrets.TIDB_PORT }},
            DAILY_TOKEN_LIMIT=${{ secrets.DAILY_TOKEN_LIMIT }}
          secrets: |
            TIDB_CONFIG=TIDB_CONFIG:latest,
            SUPABASE_CONFIG=SUPABASE_CONFIG:latest,
            DIFY_CONFIG=DIFY_CONFIG:latest,
            DISCORD_CONFIG=DISCORD_CONFIG:latest,
            ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest
